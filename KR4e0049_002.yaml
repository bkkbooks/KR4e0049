難儔鷗鷺為朋只浪游田里清淳依谷水關河迢遞隔台州西風采采黃花晚落日離離碧樹秋白髮催人傷老大少年聲價落責樓次韻答張林泉五首憶昔交游各少年君年八十愈昻然幅巾短杖林和靖斗酒長篇李謫仙修竹簷前香細細落花風外影蹮蹮有時飯罷無餘事展席科頭自在眠繪像耆英古有堂先生鬢髮已蒼浪寫書簡竹枯鮮碧臨帖箋藤搗硬黃潮汐去來溪一曲垣墉周匝樹千章執經弟子皆循飭道統真傳遡紫陽倦草淮南大小山此身長與白雲閒南鄰北舍相歡洽西陌東阡自往還筆勢縱橫驚雨驟文詞竒古發天慳幾時共剪西窗燭尊酒髙談一破顔百年孤抱嵗寒心不覺頭顱雪滿簪梧陌鼎烟時瀹茗石牀衣露夜橫琴水雲深處成真賞風月良辰動苦吟欲訪郊居曾有約桃花浪暖一篙深枕流漱石豁煩襟日月容光實照臨御筆曾題田氏宅王門莫聽戴逵琴明經教子傳家學買宅租田罄槖金壽格期頤能有幾垂垂白髮送光陰次韻答陳祠部景祺三首傳家謹護一氊青膝下兒孫嵗嵗增松頂雲開晴放鶴溪頭潮落晚移罾堂臨緑野從行樂路直青霄定立登幾欲拏舟尋舊約望窮煙樹碧瀾層碧海雙金逺送青對之詩思晚逾增庭前洗竹閒留鍤池上義魚不用罾錦里角巾唐杜甫蘇門長嘯晉孫登羡渠伯仲幽栖處又隔風塵幾百層海中有大金小金二山錦樹離離海氣青嵗年大稔粟加增僕夫緯篠修魚箔童子紉絲結蟹罾北舍南鄰相往復東臯西疃自臨登香浮缸面新醅熟膾切鱸肥玉作層新春風雨次陸北岩韻三首博山沉水裊輕烟嵗旦常儀總粲然笠屐賔朋來雨外盤觴兒女列堂前梅驚朔次朝猶落柳怯春寒晝未眠盥手正襟端策問今年還可種圭田江南風雨見何曾十日都無一日晴曉起暫看新嵗厯老來偏動故鄉情良辰美景須花柳妙舞清歌待燕鶯喜有山林容我輩共將詩酒樂文明鳥車載鬼過遙天白雨淋浪雜翠煙喜咏久無工部老禱祈未用玉堂仙世情簡淡非今日春色凄迷似去年風景不殊鄉邑逺夢歸夜夜浙江船次韻答山泉上人曦緑溪野徑僻通村百尺梧桐翠長孫海色曙凝生白室香雲晴護牧閒園額輝郡乘招提古名重鄉評行業尊近掣藏函翻般若何當聨席與精論海曙軒香雲室牧閒園皆上人扁名次陸北岩韻二首廬外圭田二畝强鄉鄰傭力為移秧百年岡壟衣冠閟一徑楸梧雨露涼天地無情身老大山林有分髮蒼浪急流勇退人爭羡喜見春風日載陽畎畝髙低絡翠徑樹林茂密列雲屛水村沙路迢迢白茅屋炊烟處處青谷口樵歌西日暝岩頭虎嘯晚風腥先生歸也山居靜童子篝燈月半扃嚴寒次粟隱德上人韻二首雪留十日未都消畫閣娛情遣寂寥茶敵睡魔浮玉乳酒烘吟臉暈紅潮雕盤異饌明妝捧寶鼎沉香烈火燒應有窮途飢凍者一般風景不同條匡牀燕坐坎離交氷綴霜髭口欲膠暖老正宜絲作毯逸居那敢樹為巢飢禽戰羽時僵仆猛虎摩牙夜噭哮造物屈伸端有數醉歌自把唾壺敲登千山次林泉徵士韻二首水作巴蛇走澱湖山蟠天馬載浮圖重重桑柘平原近閃閃烏鴉落照晡林廟幡鐙祠岱嶽江城雉堞帶東吳歸心自是愁如織只怕游人唱鷓鴣干山一名天馬山下有平原村欲學當年乞鑑湖鵬程九萬阻南圖望窮海上天無際倚遍闌干日未晡一代衣冠成二老百年藜杖寄三吳南村亦有林泉趣春雨聲聲聽鵓鴣周萬竹知紹興府日其家梅花盛開西賔張林泉作詩寄之及簡越上諸友因次韻二首南枝向暖競先開何處人間有玉臺氷艷雪臞渾好在月香水影入詩來逋翁湖上清魂返仙子羅浮小仗回寄逺慎毋多折却使君調鼎待鹽梅麟經家學保青氊文采風流藝且賢池草西堂生夢裏官梅東閣到吟邊㑹稽望去無多路朋舊别來今幾年見說蘭亭只如昔勝游須在莫春天次胡安州韻宦成歸老有餘暉吟苦從教帶減圍卜搆北山欣地僻閲耕南畝慮年饑雲霄孤鶴盤旋過野水閒鷗自在飛炎暑困人多病暍寄言莫怪往來稀萬山遺叟以所作中秋重九二詩見示諸公和之已多勉强效顰二首髙碾長空玉一輪娟娟零露洗浮塵良宵又值中秋節老我堪憐百嵗身對酒漫忘誰是主賦詩那有語驚人據牀談咏還多興沈浸清光景思新重陽佳節無風雨倦客他鄉憶水丘采采黃花人送酒迢迢碧漢鴈橫秋喜無敗興催租者自有循溪蕩楫舟底用登髙方是樂嘉賔三兩醉還休五月菊老圃乘凉起歎嗟孤標底事便開花石榴明處朝同采紅藕香巾酒漫賖畫舫沅湘懷屈子薰風庭館屬陶家也知不為趨炎出莫忘清秋興緒嘉次夏西疇韻亂餘及見太平年聖主龍飛地幅員父子戍邊歸未得公疾下士禮彌䖍中天孤月應同照尺素雙魚孰為傳昨夜釭花頻送喜好風吹墮白雲篇題德如海上人聽松軒定起忽聞風雨生危枝只恐鶴巢傾蒼虬鼓鬛噓天籟翠浪掀空送海聲一派笙簧秋淅瀝千官環珮玉琮琤我家亦有閒庭院不及山窗分外清寄題陳孟文叢碧軒一室蕭閒竹裏安緑波洗出萬琅玕雲深競舞青鸞瘦簷曲長霏翠雨寒三徑清風人楚楚五車汗簡墨珊珊何當直造談𤣥處展席凉隂搗月團小游仙詞雪後一日甲子作瑤池謫降小真仙只在人間二八年長日沈沈緘祕緒浮生草草厭塵緣一函遺蛻寒璚隕五夜清魂皓氣縣鸞鶴啓途幢節擁碧霄如洗月嬋娟借韻答清溪邵先生西泖移家住北村謝庭蘭玉見𤣥孫門前料理桑麻圃雨後栽培杞菊園象齒篆籤書列庋松花釀蜜酒盈尊平生不飲惟留客翰墨詞章熟考論借韻答宗髙王架閣蕭然一室數家村籍甚三槐幾葉孫詩句驚人師杜甫妍詞落簡客梁園承恩出牧年方妙謝事歸休道益尊不覺數年成闊别老懷耿耿與誰論借韻答牧菴上人謙暨無心野人南村差似浣花村慚愧山巾宰相孫獨抱遺經耕壟畝病辭束幣老丘園此生空忝諸公後舉世何如見佛尊翠竹黃花真妙理清風明月不須論七夕次萬山韻瓜果中庭漏㸃深露花零亂滿琪林曝書偶忘今朝是乞巧欣逢此夕臨雲馭瑤池靈剡剡星梁銀漢影沈沈人間天上同欣樂只有悲蛩語不禁登超果寺一覽樓次林泉民韻層樓明敞奠松關萬里蒼茫指顧間地絡泖茸羅梵塔天低溟渤獻神仙寶陀像設金千鎰瑞井光涵玉一環倚遍闌干吟未了伽陵風細韻綿蠻宋治平初錢武肅王所奉觀世音像至淞江禮塔匯光爥于超果寺之金鰻井繇是迎像至焉井今名曰瑞光次韻答邵青溪先生藜杖烏紗過百年童顔鶴髮氣泠然窩尊安樂元通譜壺隱虛閒别有天課稼春行黃犢外尋盟時到白鷗前青溪一曲春如許二頃何須負郭田雪次陸靜菴韻剪剪寒風勢轉嚴六花撲簌綴髙檐蟻醅銀瓮人微醉獸炭金爐妾慣添大地一方調玉燭遙山九㸃詫形鹽明朝擬向西園賞四敞罘罳卷毳簾胡萬山腳氣陸北岩遺詩問訊因次其韻見說新秋仍病痺南州土溼暑熏蒸耳邊愁聽三江雨胸次清涵萬壑氷臥起東山今謝傅嘯聞半嶺昔孫登北岩老子題詩寄愧我才疏闕剡藤感懷次韻數椽茅屋稱幽居環堵蕭然日著書鄰曲往還忘主客林泉映帶樂禽魚一經闡教韋丞相三策成名董仲舒自愧無能空白首子孫便好問耕鉏中秋玩月次胡萬山韻東頭湧出爛銀盤簾卷南榮仔細看秋氣平分宵寂寂凉輝十倍露漙漙阿㕙藥臼敲清杵素女霓裳跨白鸞欲折丹葩向髙處璚樓玉宇不勝寒次張林泉韻潛化芝蘭四十春多君文采玉為人青燈風雨思還共白髮江湖老更親東漢獨髙嚴瀨客西疇自擬葛天民滄江今日同耕釣竊景前賢託此身次韻答胡别駕避地僑居泖水濵相看白髮與時新好山登眺無多處榮宦歸來有幾人雞黍㑹多談笑數芝蘭氣合性情真莫年我輩須行樂莫遣蹉跎過一春正月二十有六日余與邵青溪張林泉㑹胡萬山夏雪蓑俞山月髙彥武張賔暘于佘北踰嶺而南訪陳孟剛席上分韻得船字桃源只在人間世三老相逢莫問年清晝喜陪多士集紫霄只恐德星躔香蒸雲液行璚斝花簇珍羞飣綺筵一櫂歸來潮正落溪頭好似米家船題張惟德清逸軒詩卷結廬自愛南村好盡日蕭閒遣興長一榻松風茶在鼎半簾溪雨酒盈觴遙岑爽氣朝來致小徑黃花晚節香聞道層軒清且逸我將過汝共徜徉過沈汝舟故居次范宏逺韻不見幽人左太沖鶴歸遼海蕙帷空敗垣躑躅春酣日老樹鵂鶹夜嘯風怪事書空千載一長干作客幾人同可憐滿眼凄凉淚都付詩篇感慨中次萬山韻風雨江湖雪滿頭斗南名士總交游山林已自無多在我輩真成第一流折簡招邀春釀熟策笻來往野情幽年年無事長相見底用尋盟到白鷗南村詩集卷二
