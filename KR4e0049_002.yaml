body:
  text: 南村詩集卷二明陶宗儀撰南村雜賦十首平生耽逸趣久矣謝浮榮計左真鳩拙形臞類鶴清晚風溪艇釣春雨石田耕此日容衰老徜徉樂太平屋小長林束村深四水通睡因閒處熟愁向醉時空鵝鴨春波緑牛羊晚照紅嵗輸公賦足泚筆紀田功門對山殊逺溪回路覺賒入城因買藥租地為栽花草草杯盤數悠悠興緒嘉今年官稅急月下響繅車編圖從入甲養子慮添丁閣筆焚三策攜鉏帶一經語多鄰叟醉妖勝里巫霛俗薄何須較柴門盡日扃徑微深草沒橋仄亂雲藏簷角聨漁屋籬根繫野航雨餘晴溜碧天逈晚山蒼回首關河隔并州是故鄉家貧田亦瘦身惰禮全疏囊錦新吟藳篋藤舊著書小童能理櫂稚子學將車何幸無榮辱長年此逸居客分疏雨去人帶斷煙耕地曠乾坤大心閒景物清藥材書劵貰琴直典衣更嵗嵗西疇秫深憑送此生池塘才半畝浦漵走三江斷壟春煙犢疏籬夜雪厖逍遙浮晚艇寄傲倚南窗采藥鹿門逺誰能逐漢龎遙岑浮碧漢長泖護青林地僻人家少泥融虎跡深關河南北夢風雨短長吟覽鏡憐遲莫鬅鬙雪一簪徑竹霏香細籬花鬬色多捲簾黃犢雨把釣白鷗波清士攜琴訪諸生載酒過有時香一篆髙枕到南柯南村後雜賦十首路直華亭谷林藏處士家葵菘浮雨甲粳秫吐晴葩塒羽肥堪縛溪鱗巨易義客來留共酌濁酒不須賒甲第多荒址茅茨獨老翁杖藜山逺近舟楫泖西東草色蒹葭外秋聲絡緯中郊居端不惡此趣許誰同槿樹成籬落松脂化茯苓閒開籠鶴柵時過狎鷗亭汗簡修書史持杯閲酒經塵纓終不縛何愧草堂靈谷口蘭宜佩庭前草不薅畨田栽薯蕷縛架引葡萄杜甫十分瘦元龍一世豪賣書買農具作業豈辭勞道狹循墟曲橋低與岸平風前松子落雨後竹姑生向此得閒趣自來無宦情烏巾方竹杖林下一田更江海謀生拙園田引興長徑分黃菊本池種白魚秧瘞筆營山竁橫琴布石牀俗氛飛不到一曲水雲鄉草徑牛羊熟雲林鳥雀馴九峰三可攬一室四無鄰世治方為樂身安豈厭貧涼風北窗下未讓葛天民農事年年在家常頓頓謀拾樵驅赤腳舂粟課蒼頭屋破何曾補人生本自浮賦歸歸未得長夜夢台州雨社來巢燕晴衙散蜜蜂螙書魚繭實透墨麝香濃幽夢回髙枕新詩入短笻一經今白首自怪此生慵僻壤居偏樂幽懷老自添鍊丹溫候火丸藥捲風簾雨過魚蝦美春來筍蕨甜長年無一事治世等黃炎元日試筆次張泉民讀書莊雜興八首素履安吾分深居去俗嫌襟懷髙莫擬材力老逾添翰古兼行楷經明法謹嚴鶴書還赴隴光耀起幽潛自將茨覆屋逺勝樹為巢徑曲菭花匝溪回浪影交柳隂維釣艇竹裏搆行庖我欲頻相訪談詞愧草茅道在寧謀食時清不慮貧弟兄三俊彥天地一閒人攬鏡菱花曉開尊竹葉春文成五色錦采采濯芳津松樹曾巢鶴溪流可浣花步鳴蒼玉佩閒鍊紫金沙揮麈懷王衍橫琴仰瓠巴有時因客到沽酒向西家生平甘淡泊質稟甚清通經史沉潛裏溪山笑傲中夢游天祿閣詩寄蘂珠宫自是神仙骨塵凡迥不同懶騎金匼匝喜弄玉參差宇宙清寧日山林老耄時處中知守節履正在觀頥白髮磻溪釣飛騰未可期鄉里陳留逺才名二十餘文章宗太史詩法嫓黃初避地僑淞水誅茅結草廬功名諸弟貴問候列華裾搆室延虛白臨書搗硬黃但祈年大有安問世炎凉苜蓿堪羞饌芙蓉可集裳壽齡過八十無夢到鵷行次姚憲僉原禮韻簡明上人古鏡六首雲棲常自寂蠖屈豈求伸翠竹真如理青山妙色身滌除三毒火清淨六根塵出定寒宵永明蟾挂碧旻接流晴灌菊陟巘晝捫蘿地僻經行少心閒興趣多瘦笻縣樹底壞衲曬岩阿清盥無餘事因箋證道歌九山多勝槩此地一叢林石路循清澗茅堂枕碧岑野狐來聽法游衲問安心虎樹髙千尺師寧不嗣音林日遲遲靜溪雲淰淰輕雜花閒自落幽草細無名慨我朱顔老傷情白髮明何繇湔垢纍問道立前榮清寂山中景逍遙物外身好茶留客煮香茝課童紉欲識空為了還知懶是真釋門推老宿佛法在彌綸乾坤容隱逸寒暑互遷推獻果猿殊熟銜花鹿不疑食餘隨洗鉢梵放輟談詩送客長松下東頭月上時曹雪林夜宿草堂有詩因次韻杖屨來相訪柴門倒屣迎好春尊蟻緑清夜燭花明每苦連旬别相踰半日程如今宜盡醉足以慰平生對雨立春將一月積雨已兼旬潦水村村白愁雲旦旦新世方期樂嵗天豈厭斯民便好驅陰沴陽和被廣輪元宵總說春來好春來尚寂寥江山緘媚景風雨過元宵室白燈光燦罏紅火力饒杯盤兒女進懶赴北鄰招游查山山上有查仙鍊丹井東眺黃耳冢西秦山四面黃茅合南頭粉堞髙丹泉生石甃山趾帶平橋犬寄華亭信蛇吞戰國豪登臨增感慨落日在林臯役役弟妹分離久家鄉信息遲賣書人閷直穫稻雨愆期髮向愁中白顔從病後衰終年常役役何日是歸時次郁鈍之韻多病誰分藥窮愁只著書青郊春雨稼緑樹野人居天地身將老朋游日漸疏寄來詩句好功業復何如夢游華頂峰題詩于壁松徑曉停驂朋游只兩三鳥啼烟作障僧坐石為龕訪古人何在探幽我尚堪杏花風日美春色滿江南詠佳人效香奩衣皺霞千疊鞋彎玉兩弓色酣眉黛緑香膩口脂紅密約心還怯多情意未通黃昏頭懶卸繡被象牀空著雍執徐之嵗三月望後一日率僮僕抵鍾賈山采薪供㸑至四月朔歸每日陰雨繫船溪水頭山中成久留半月總值雨一身都是愁哺雛敗簷雀逐婦深樹鳩薪采輟夫役摘蔬薦晨羞寄夏原舟時從軍瀋陽分離忽兩春役役幾艱辛兵籍何時落鄉書此日真乾坤同是客風雨正愁人望斷渾河逺蕭蕭白髮新寄題性源上人清影軒勝地昔曾行雲扉夜不扃長林籠碧瓦明月照朱櫺世比龍門寺經翻貝葉青開秋敷石榻遲我一揚舲丙子元日朔紀庚申始風從甲艮來隂霾低不散天意邈難猜香縷縈銀燭椒花浸玉醅賔朋交致賀獨我老衰頽中夜不見月延桂敞南樓更傳第幾籌玉城衝雨立銀漢拔雲流曲度霜娥怨談停老子愁相看須隔嵗虛過此中秋十六夜玩月次韻中秋風雨隔二八正圓時天上清虛府人間太液池飛騰蟾皎潔玩賞客權竒偏照南村老蕭蕭兩鬢絲中秋夜陰自小看明月看來已白頭年年栖逆旅草草過中秋銀漢金波斂氷奩玉鑑收凄然向今夕嘯咏想南樓十六夜獨酌今夕非凡夕璚樓影尚彌才經一日隔未覺半分虧再索新篘酒還賡昨賦詩舉杯邀對酌真足暢幽期十七夜傷感四十二年前今宵最可憐明蟾徒自好愛子竟長捐父母情懷苦乾坤造化偏老來頭雪白不斷夢縈牽過蕭塘市不到蕭塘市流光十五朞岸傾街甃裂寺廢梵幢欹第宅留荒址垣墉易敗籬相知無一在遺跡動傷悲閲耕上國曾辭聘南村且閲耕心安閒自適肌瘦老逾淸趣向琴中得詩從枕上成平生隨造物多幸見升平龍鍾吳楚躬親歷關河事熟諳客居淞水上鄉夢越山南豹變知無及龍鍾愧不堪有時扶短策去就老農談濯足濯足咏滄浪南村住草堂風簷縣襏襫煙艇帶笭箵總羡耕漁好渾忘嵗月長建文開泰運聖德嫓軒黃笭箵元結自釋音郎當蓋竹籠也歸途徐村阻風徐家村疃靜柳下泊舟航故國南游逺東風晚更狂歸心如箭急流水似人忙明日宜興縣長橋酹一觴簡顧秀才地偏春自勝市逺客尤稀草閣開清晝溪航載落暉雜花晴簌簌輕燕晚飛飛問訊東鄰老還容覓釣磯西湖紀興浩浩春波闊冥冥夜雨縣笙歌傳别館燈火隔疏煙作客頻遷次傷時更可憐明朝晴未卜還是醉湖船五里塘破屋三家市扁舟五里塘亂波浮落照飢雀聚枯桑氛祲乾坤戚兵戈道路長漂流無倚著何日定歸鄉南村對雨雨氣連村白溪流觸岸渾餘寒欺鳥雀清潤溼琴尊修竹明如洗長楊翠作屯草堂初睡起曵履掩柴門和鄭南榮韻煮茶燒落葉掃徑動閒雲水涸溪痕見林疏岫色分齊居長自掩麋鹿動成羣短屐相過數惟應鄭廣文癸亥元日通夕零寒雨開晨吼朔風人惟憂樂異節自古今同故國丹丘外浮生白髮中力田憂水旱端策問凶豐元夕珂里傳柑日金吾放仗時樓臺燈火淡風雨管絃悲術眩明皇幸儀尊太乙祠千年成古蹟兀坐漫齎咨過顧城湖昨行三塔崦今過顧城湖帆正風猶順程遙日漸晡礙船防斷渚收港認浮圖同往皆良友羈情喜不孤己卯中秋移榻近前榮良時引興清雨從晡後散月向夜深明靈兔曾無恙孀娥若有情舉杯邀對酌隔嵗好尋盟中秋今夕知何夕南軒景趣幽露溥蟾影耀風靜桂氛浮移榻催鋪席褰簾快上鈎年年催老去又見一中秋辛已中秋海㝢樂升平中秋景象清秪緣人意好轉覺月華明今嵗僉愚戅比鄰異死生聽來惟是哭孰更不傷情兵部遣使至府府命兩縣僉㸃身長力壯民丁應充謂之曰愚戅不下五千餘人九月朔日庭前白菊開花尋常重九日難得菊花開今嵗困添閏孤芳亦借魁翠裘雲掩冉鶴羽雪毰毸三嗅秋香立吟哦待酒來丙寅中秋雲開天宇潔玉露滴琪林靜對中秋月偏傷故國心半生常作客此夕一霑襟弟妹書難得窮愁老轉深十二月望後一日輸粟金山衛渤海金山小坡陀草路危城池連斥鹵部伍雜華夷比屋屠牛肆髙竿賣酒旗一旬愁裏過雨雪滯歸期十月十一日夜夢中賦詩一首既覺忘前四句枕上足成之柳風輕娜娜竹雨淨娟娟有只書千帙無多屋數椽村深居自好心逺老相便載酒溪翁羡桃源小洞天十月草六日喜雪分韻得同字今年方見雪歡喜萬人同觥巨醅浮緑窗明燭耀紅煎茶移石鼎理櫂命溪童黃竹何須賦休祥兆嵗豐庚辰元日授厯紀庚辰開元值丙寅五更微見雪兩日便迎春頭戴銀幡巧門題彩帖新屠蘇循故事殿飲老年人九月四日遣愁塵鎖斷絃琴悠悠嵗月深遺言仍在耳惡日倍傷心路隔重泉窅墳封宰木陰臨風耿無語老淚一霑襟惡去聲忌日也哭王黃鶴乙丑九月初十日卒于秋官獄人物三珠樹才華五鳳樓世稱唐北苑我謂漢南州大夢麒麟化驚魂狴犴愁平生衰老淚端為故人流乙丑十月草八日得鄉人林序班公輔寄聲報舍弟夢臣沒於道未知月日地所二首白下相逢日于今十二年江湖俱老矣風雨獨凄然哀訃從人得殘軀為國捐生兒多不育身後竟誰傳弟兄惟我在骨肉永睽離王事勤勞日關河夢斷時水深風浪惡夜靜鼓笳悲號慟嗟何及傷心老益衰哭馬平主簿夏原威丁卯臘月十三日卒詩書承善慶簪組沐恩榮賦命分修短詳刑服重輕平生師友義終古别離情盡掬寒淞水難前淚眼清挽陸北岩教諭辛已十月草九日卒北岩今已矣命也復何仇形影長相弔文章不自謀夢殘蕭寺夕魂返故山秋多少傷心事哀猿哭未休挽趙雲居先生二首辛已九月十八日卒故國王孫後先生德望隆相將年九十出處浙西東學本趨庭教醫存濟世功俄然棄榮養哀慟起秋風吳淞今共客台婺逺相連去國二千里論心四十年故人將盡矣老淚重潸然修得遺賢傳儲輸太史編送何伯溫還鳳陽索居濠水曲嵗月共悠悠㑹面忽今日憐君已白頭關山來去路風雨别離愁溪上船催發寒潮沒逺洲開罏日有感是日始見霜陽月日云初新霜萬瓦鋪具羞供墓祀熾炭暖寒爐望望鄉關遠栖栖旅思孤形骸看漸老節序不停徂挽張雲莊宗禮三首客邸病縈紆驚憂鬱未舒紫桫函蛻骨白下返靈輿故里千年别浮生一夢如莫雲莊上些山雨竹樓虛嫁殃遭太守簿録降將軍短景燈餘焰繁華水上雲賢愚誰復辨玉石竟俱焚次第修言行他時表墓文嗚呼吾友汲相望去程遙遺恨孤慈侍清魂入大招諸兒銅鼓衛一穴鳳山椒淚灑西風裏交情永寂寥洪武癸酉正旦雨明日雨中夜雷電又明日雨四日陰曀嚴寒西北風大作口號迎春半月先寂歷過新年雞狗羊猪忌風雷電雨全𤣥冥雖代謝陽德未昭宣有待隂