body:
  text: 南村詩集卷一明陶宗儀撰永思堂詩為董仲資作子之於親思無不至生育恩深與天地嫓一别千古終養莫遂永言孝思思曷有既爰陟我屺爰陟我岵瞻望莫及心焉如燬露雨降濡秋春收履悽愴怵惕感時撫已居處笑語志意樂耆書册杯棬手口澤氣食而羮只居而墻只如將見之愛慤並致我身之存親為不死豈敢一日忘乃所自思繼其志思述其事思貽令名作則錫類奕奕髙堂奐乎百世名堂者誰繄仲資氏子孫繩繩衍休委祉方來之思有引勿替鐃歌鼓吹曲二章至正丙午夏秋之交彌月不雨民以菑告錢塘張野賔者得法於靜樂君禱輒有應時留松江郡父老請建壇城北門翼日乃雨士大夫作為文章歌咏以美之因製漢鐃歌鼓吹曲二首云屢豐年上帝閔農也帝德好生易菑為祥焉屢豐年羣生熙癲我旱寧怨咨星火烈螟螽滋苗而不秀歲且薦饑精誠格天聽允惟念之命幽靈擊妖魑龍膺捷疾先後馳金精流光淫虹糜四溟靉靆甘雨時積水彌九野稔而可期不殄禋祀上帝是祈旱既甚張君闡化也君積功纍行有禱而天應之旱既甚金石流苗恙槁民煩憂疇能祈天致天雨曰惟張君驗之屢雩壇長跪恭進詞黑札𤣥文啓雷祖閇陽縱陰理則然叱電鞭霆一何武暘烏鬱光祝融奔淵龍起蟄商羊舞甘澤及我私田里長歡娛擊壤歌至正厥功匪君誰擬古用陸國隱韻古人重節義出處蓋弗茍而我何為者南北事奔走惻惻懷故里去去成老醜富貴不可期聊以酌我酒其二浮雲蔽頽陽凉飇謝繁緑氣化相尋繹百嵗一何速達人意有在豈復傷局促且持杯中物對此籬下菊其三王風萎衰周人紀壞狂秦大朴變哇淫雕蟲蠧天真迢迢百世下禮樂就沈淪尼父不復作聖道詎能新郊居次韻張善初南村有遺逸白首軫黎元平生厭趨競甘分老丘園未知軒冕貴但識綱常尊匪敢異流俗亦云道所存縱酒破愁壘煮茶資詩魂仰見衝霄鳥剡剡脫塵樊俯憐縱壑魚戢戢含愁寃懷哉鹿門龎以安遺子孫茍可脫世慮何辭農事繁深衷誓無渝持此與誰論憫鶴次韻顧語溪豪家闢池館千金買猿鶴青衣職糧雕籠塗粉雘客有芝田生飛佩風前落清類春水鷗奮若秋天鶚偶觸虞羅機遂失雲松樂翻懷丁令威流睇青山郭不乘衛公軒詎中唐帝繳滄海幾揚塵丘陵或為壑主翁載馳驅髙情漸衰薄俄然憂患來難以談笑卻玉帛奚足云繁華頓成昨宗族永參商妻孥苦凌虐出獄擕敝裘徙邊無逺槖而汝混芻豢編名從寄泊鎩翮并州刀驚夢周廬柝長鳴聊自悲俯啄亦云作雖愁蕙帳空莫厭雞羣惡念彼逺行人視此更離索淚落返哺烏愁對青城雀安能招汝游吹笙上寥廓洪武癸丑八月二日與諸暨趙用賔黃漢章趙自立江陰孫大雅大年丘宗岱程傳可同遊鍾山分韻得落字鍾山育靈秀寶坊炫丹雘王氣接闉闍冷飇灑巖壑泉球石罅鏘松籟空中落吐詞極名理摛藻騁竒作嘉㑹難重期斯游諒云樂矢言謝囂煩永志在寥廓游查山分韻得日字雪後天象清維時月初吉三老山中居杖藜乘興出總訝神仙流衣冠兼散逸叩我東家門造我讀書室主人重留連開尊叙真率傾寫間别懷氣誼等膠漆送别河梁上悵然若有失快行莫遲遲猛虎嘷落日戊寅正月四日紀實臘月草八日風起東南方嵗行在丁丑氣候異尋常和煦過於春入夜風怒狂草九日禺中螮蝀粲龍章或雨而或晴至晚天昧茫隱隱雷發聲􅖙􅖙電流光狂風轉西北徹夜吐寒鋩除夕猶未息地凍萬木僵正旦興啓扃雪積二寸强三冬未曾覿對之神肅爽九朝方是春亦可紀嘉祥老農乃見謂夏秋旱相望二日三日來風力轉披猖四日值壬子晴朗開孟陽嘗讀通政經冬雷未為臧十旬要陰晦民庶有菑殃載憶變異録尤覺熱中腸禾稼不稔熟喪亡起饑荒華亭連二􅑤旱潦苦莫當口食不暇給奔走營餽餉上帝必閔念爾農勿憂惶雨風順以調萬姓保安康已卯人日元日至人日未有不陰時甫也昔所云屢驗信弗疑今嵗異常嵗萬口稱稀竒一晴連七朝春氣即盎而輕烟散微暄麗日流祥暉溪山逞德色草木帶光輝羊猪狗雞利馬牛被郊畿民物鮮疵癘禾稼其蕃滋天子居大寶念民日孜孜上帝昭聖心報錫以雍熙水旱不為虐雨風常適宜四方習禮樂八表砥清夷古道曾弗泯薄俗還可移贓貪强黠徒廉正當自持慈愛撫幼小孝弟奉期頤斯理乃必然蠢爾蓋未知我生頭雪白何幸身見之但願飽喫飯百嵗逺為期聽輔師彈南薰深村隔疏雨一塵飛不到輔師抱古琴叩門忽逺造解囊理氷絲下指即髙妙涓涓流水心楚楚南風操聲希意自足味淡趣自奧别去殊可人溪頭送清嘯紀行弭櫂中和橋僦舍千步廊報名謁鴻臚㑹朝造鵷行國安四方靜君明六卿良聖德湛汪濊慶祚衍靈長退率二三子躋彼容臺堂應試式中考青襟解趨蹌寢處不暇逸倏爾十日强賞謝既已竟乃遂戒趣裝挈書别居停驗符來正陽門籍甚昭著門吏更審詳左入而右出御道在中央張拱謹步驟寧敢相頡頏俄然豁塵眸紅杏映緑楊琳宫閟神樂寶殿祠玉皇闕馴馭有房周覽日未曛放船漫翔洋有客留且住燒燭羅酒漿語笑忘夜分月白露氣凉晨興未果别叩關過上方上方距方山駐望路渺茫沙河走其下水淺可濫觴行行莫能前恨弗凌雲翔展轉烏鵲矼滯礙了不妨迤邐廣通鎮長流浩湯湯長風力健順舟子意激昻畫鷁噴巨浪輕帆挂危檣筐篋緘賜金照耀發寵光槖囊貯齎糧往返迪吉康茲行非浪游素願誠我償計程七百里便可還寓鄉兒女出門迎童稚列兩傍膝下問起居歡樂諒非常秋懷次戴景仁韻商飇解殘暑南村生早凉弄琴理書帙雅思一何長衰蓮送餘馥叢桂吐幽芳泉清茶鼎潔簟細石牀方人生能有幾孰可駐流光顔鬢漸衰改事業終荒唐既無俗纍縈所喜心凱康眠早起常晚肻與世匆忙春來喧鳥雀秋至響蛩螿萬化相尋繹寒暑去堂堂非是總不營有酒即舉觴日夕歡一醉身世兩都忘雜詩顛倒持太阿乃以柄授人人或有怨惡寧不傷吾身喟彼秦二世委政託姦臣指鹿以為馬非是孰敢云願言把劍者名器宜自珍酷暑謠庚辰六月十日至草三日酷暑可畏火雲崒嵂火龍劣火星熒煌火光泄田疇龜坼土鱗皴海波鼎沸泉脈竭直疑天地作紅爐黃金可銷石可裂年年三伏暑固隆未有今番如此熱兀坐渾如墮甑中又類餘酲共羈絏支惰放肆倦舉舒舌呿莫持懶言說霑賜誰能玉井氷消煩欲踏蓬婆雪農夫農婦有死者道上行人多病暍邊庭將士其奈何鐵甲銅盔汗流血願祈甘雨洗炎歊普為民心蠲蘊結折楊柳送夏西疇謫居大梁折楊柳贈君别楊柳未折心已折丈夫落落志四方到此誰能不嗚咽江南九月天雨霜雁聲墮地秋風長出門行行幾千里寒烟落日增離傷令嚴獨許擕家室藤笈編花載書帙可憐身上千金裘阿㜷手縫針線密吾聞中原百戰餘民物鮮少城邑虛君去結廬得幽勝便可小擬西疇居荆蓁塞路猛虎伏髑髏如山冤鬼哭願言緩轡毋疾驅疾驅恐防傷馬足折楊柳歌苦詞呼酒酌君君莫辭黃河之水東南馳人生㑹合還有時莫春謠奉和正齊承旨韻風颾颾雨蕭蕭東皇促駕車載膏墮紅殘萼芳草深嫣香壓地膩不消繡屏寒逗熏沈腦愁重燕支倦梳掃玉關萬里人未歸風雨一番春又老題趙魏公秋林曉行圖疏林慘淡月欲墮嫋嫋哀猿啼一箇橋危霜重白於銀蹇驢行澀輕踏破魏公人品世莫儔平生快意居庸游戲將丹青寫八法西風黃葉江南秋功名到手辭未得玉帶金魚疲峻陟他年解印賦歸來濯纓亭下鷗波碧風蘇湖嘉興松江毗陵諸處皆然後聞湖廣江西亦同浙柬尤甚洪武丁卯閏月終暴風忽從鬼戶作故人不來君子藏巽二踴躍蜚廉惡或噓或嘯或怒號匪雄匪剛匪羊角倒掀渤澥鼓雷霆簸蕩堪輿撼山嶽萬頃嘉禾盡偃如十圍古樹猶拔却塔輪震墮聲鏗鍧屋瓦亂飛勢揮霍鳥雀驚仆渾已僵虎豺戰栗如可縛萬民失色一翁云八十七年無此若小齊斗大容老夫斜雨敲窗打牀腳徑侵衣被及琴書毒甚卷茅欺我弱何不廣莫掃兵塵何不仲夏驅炎熇尚憶當年歌漢皇普天率土皆安樂題李州銘所藏毛澤民山水竹雪子能畫山醉來解衣盤礴羸筆力甚似荆與關版凳橋西懵懂樹灰堆峰前鴨嘴灘夕霏翳壑氣暗靄春瀑出澗聲潺湲逺岫離離斷復連湘娥綰結風前鬟若非子真谷口宅定有太一𤣥都壇竹雪子玉筍班面帶河朔氣態度美且嫺鳥跡印沙文錯落蝸涎行壁勢回環物物本然具畫理妙處豈在鐫琢間脫略畦町掃邊幅八法默契烏絲闌寸楮片縑亦可愛令人咫尺思躋攀此圖忽落李君手時復把看多歡顔老余撫景感真游清盥題詩卷送還題江山萬里圖滾滾長江出全蜀一派波濤瀉寒玉天設巨塹鴻濛先厥德靈長紀南服濫觴岷松略巴梁分源崌崍走豫章吐吞沅澧引沱澨包括洞庭納鄱陽玉壘蛾眉兩旁礴石鏡武擔連劍閣合江西頭萬里橋漢使入吳曾駐泊丈人拔地髙青城翠浪起伏勢東傾雪山去此知幾許一覽如隔芙蓉坪丞相祠前森老柏支機石在君平宅浣花溪碧草堂幽越王宫殿成狼籍中岩林泉嘉處多相傳嘗栖諾詎那慈姥老龍亦共止岩阿小寺埋薜蘿渡瀘亭對諸夷路尚疑果從何處渡魚復浦中八陳圖前後縱橫經緯布灔澦撒髮怒莫嬰黑石獰惡荼槽并巫峽之險復愈此凝真觀前如震驚十二峰巒羅翥鳳船過神鴉管迎送吒灘直接歸州灘自昔號為人鮓瓮黃牛廟睇黃鶴樓雲夢澤通鸚鵡洲赤壁臨皋才尺咫琵琶亭下蘆花秋匡廬雄尊五老立大孤小孤遙旅揖彭浪磯前即馬當九華采石青戢戢鍾阜龍蟠奠九州石頭虎踞當長流北固紆徐鐵瓮堅金焦兩㸃浮漚猶春申墓陰鵝鼻嘴角力狂瀾障崖趾烟水瀰漫豁海門亘古朝宗從此始彼美畫師儒林英天機所到雙眼明拂拭素繭掃𤣥瀋閉戶不聞風雨聲老夫平生山水癖白首臥游還歷歷客持卷軸請我觀題詩聊復識疇昔送李孝廉至剛之京鄜州同知我鄉友氣誼不啻金蘭如異縣交游四十載汗血復見名家駒雄姿逸態乃若是濯濯春風一端綺六籍諸史蟠心胸自分身名巳千里至尊在御日萬幾宵衣旰食憂羣黎宣集耆農至闕下能者受任否者歸歸給尺簡録諭語方正賢良聽推舉邑村爭以名姓聞生丁昌運天玉女唳鶴灘頭江水秋雞鳴起柁逐前儔霄漢縱髙從此上林泉雖好莫能留朝廷禮士邁古昔除擢那能限資格涓埃報效盍忠純慎勿貪欺傾厥職廉能總稱先府君聲華軌範有持循補袞當師仲山甫作霖期嗣商巖人銀河斜墮月欲入晨光熹微候蟲急雙瓶酒盡惜暌離衫袖斒斕淚花溼中秋不見月歌青桐蕭索逗疏雨河漢雲流繭抽緒岩桂古香吹不起絡緯亂啼蛩語語曾軒四敞溪前頭犀押簾箔齊上鈎纎阿御輖如走馬一年轉矚又中秋銅壺水滴聲聲度嬋娟苦被頑陰妒寶奩慵啓氷鑑韜玉宇璚樓隔寒素升沈圓缺恆有時今夕何夕乃若斯欲接清輝徒悵怏相看動是隔嵗期疇能掃之鸞尾帚白兔搗藥銀蟾守老子婆娑興未闌蠟光髙張照尊酒聽琴行樂經焚滅樂律亡樂器不純樂師瞽獨有羲農所制琴位置森嚴尚存古體修三尺六寸竒負陰抱陽函四時上圓下方法天地前廣後殺明尊卑沈檀嶽尾犀象足徽鑄黃金軫雕玉繭絲素絃抽鳳筋髹漆斷紋剝蛇腹有時漫鼓一再行泠泉出澗氷崢嶸清鬆脆滑五調協和樂適怨憂傷并岐山峩峩周所起帝眷拘幽商不祀兒寒兒飢兒履霜殘形占夢巫咸死狄水弗涉行將歸時不我遘蘭猗猗龜之大兮魯之奄越裳來庭德孔施南熏化被民財阜杏壇教流渾未朽春江滾滾禹門遙巴蜀雪消緑於酒凌虛御風飛仙猶廣寒宫闕三郎游霓裳羽衣天上譜陽春白雪還能酬明妃出塞辭漢主獨抱琵琶淚如雨文姬心事果紛紜拍拍胡笳兒女語白雉朝飛挾兩雌老烏夜啼傷逺離嗟哉無傳廣陵散别鵠未作妻苦悲長清短清彈一過長側短側要安挫三弄梅花畫角哀鶴鳴九臯其子和栩栩蘧蘧蝶夢闌起讀離騷身佩蘭大雅不作哇淫滋隱德忘機鷗共閒漁翁泛泛滄浪艇瀟湘水雲千萬頃何似山居吟嘯日樵歌響答烟霞暝短帽輕衫美丈夫觀光上國車騎都風雷震蕩比豪俠酒酣擊劍歌嗚嗚改絃别奏清商曲秋鴻飛雲聲斷續悲風颯颯皎月流欵乃悠揚疑擊筑修真理性反天真淳古淡泊孰可倫起伏抑揚符至理情閒手敏妙入神焚香靜聽出塵表昔焉搏拊今衰老江南巨擘似公無髙山流水知音少曹氏園池行浙右園池不多數曹氏經營最云古我昔避兵貞溪頭杖屨尋常造園所炳也欵語愔從容其先來自溫許峰裕埀系𦙍二百載發于乃祖雲西翁翁之交游皆吉士趙鄧虞黃陳杜李趙文敏鄧文肅虞文靖黃文獻陳監丞杜待制李文簡李昭文或銘或記或篆顔華構翬飛耀閭里中堂曰厚德茂存翼室且可栖琴尊聿求雅志尚貞白玉照倣佛南湖濆厚且求志玉照皆堂名右齊先世手所結祖德有光增古節日長清靜講𤣥虛淡然自立止於潔右古節長清靜𤣥虛淡然自立止皆齊名素軒瀟灑緑陰腴揮麈劇談捫蝨如𤣥裳長鳴宵警夢玉靈藏六晝尸居素捫蝨皆軒名警夢尸居室名紅杏作花錦千樹簾卷髙樓聽春雨層臺甃近小蓬萊正是雪月最佳處聽春雨樓名雪月最佳處臺名曲折映帶總幽亭潔芳頃步連窪盈忘形絶念閉息影翻書寫經開遂生索笑石矼水清淺灼灼疏梅封碧蘚有時怡曠倚闌干九㸃晚山清且逺潔芳窪盈息影遂生清淺怡懭清逺亭名石矼橋名洞房塗塈雪色新瑩可受采無纎塵溫火試香扃畫閣亂雲靄靄中藏春受采雪洞名雲中春閣名溝渠流月金瑣碎緩踏修梁曳環佩露影晶熒夜色澄恍若霞川躡虹背流月霞川躡虹橋名長歌楚誦聲珊珊后皇嘉樹霜丸丹暖風細香懷晉逸一身眷戀花竹間楚誦暖香晉逸花竹間皆亭名花卉紛芳四時好竹木幾般栽未了牡丹富貴芍藥竒薝蔔婆娑木樨老蒼松百尺上衝天幽蘭猗猗被深淵菡萏解語淨如拭芙蓉弄態嬌以妍孤峰危立當月竇厚重不遷仁者壽先知稼穡用能勤别敞遺安閲耕耨月竇仁夀橋名遺安堂名賔朋滿坐冠峩冠投壺散帙罄交歡桂酒椒漿麋鹿脯璚觴翠釡琉璃盤運去式微遘菑變聞望功勛等飛電地脈衰疲草樹焦頽垣斷址低昻見草年汨沒軍旅中王事馳驅西復東賢郎告代喜賦歸問里尋鄰夢寐同百感傷心淚橫臆復新基搆難為力行囊㸃檢得舊題時時展讀聊自適老余艤櫂訪曾經狐兔窟宅鵂鶹鳴獨立斜陽三嘆息泚筆吟就園池行過太湖揚州巨浸曰震潨厥功砥定存禹跡世傳三萬六千頃周五百里渺無極誰散羣峰亂碧流七十二㸃青螺浮吐吞中吳者八九勢焰直與東溟侔魚市微茫漁屋小酒旗搖曵楓林老岸花汀草晚離離雲氣嵐光春悄悄吳越英雄今幾年鴟夷長往終不還龍虎戰爭歸一統蛟鼉掀舞藏深淵南風破浪船頭響王事有期誠鞅掌問程已過馬跡山落帆轉入沙掌港萬雉金城路尚遙篙師宵征寧憚勞後月朔旦無多日玉筍聨班要早朝過胭脂河胭脂山頭平劈破一道長溪此中過匠人十萬斧鑿功疑是六丁天所課危橋挂空若生成石壁千仞開錦屛兩邊羅列八九里吳艎蜀艑西東征四方職貢紛聨絡揚子大江風浪惡九重宵旰勞聖心特敇有司亟興作左通銀墅右沙河滔滔湛湛皆恩波可憐伊昔六代時無有及斯竟若何老臣挾書朝帝所拭目竒觀喜欲舞稽首作歌頌神武磨崖鐫刻昭萬古雲莊耕樂三十韻為升遠賦海㝢封疆近朝廷事業昌千官行政教萬姓務耕桑有美張文學端然世表章亢宗恢雅量卜地搆新莊東面波通泖南頭澤滙洋九山魚米處一曲水雲鄉氛靄翔鸞鵠峰岑舞鳳皇田疇平若桉畎澮浚如隍徑窄黏蒼蘚橋低蔭緑楊雞豚歸落照鵝鴨戲方塘投老栖身穩終年引興長程期稽七月候序驗農祥菑播加勤懇藝培敢怠遑飯休催荷鍤鐘動課移秧襏襫居常織汙邪戒勿荒螟螣遺種絶粳秫瑞葩香犬吠姿雄猛牛馴力盛强蠶眠絲吐白麥秀浪翻黃花霧琴尊潤林霏枕席凉漫浮蓮渚櫂爛醉菊籬觴夜雨防衝岸秋風趂築場䑔舂窮蚤莫斂穫富倉箱覆載恩深感征輸嵗謹將艱難天所鑒報稱理之常里社邀皆去時豐喜欲狂綵衣娛阿母縹帙教諸郎别墅矜裴相平泉鄙贊皇百花唐入詠五柳晉流芳昭代能求逸髙懷孰可量吾將結鄰並晚節共徜徉題沈繼先東林小隱緑楊深處路縈迂此是東林隱者居古屋數楹苕涘若清溪一曲輞川如風前竹疃能頻灑雨後蔬畦或自鉏岫色浮空排闥近波光漾日上簾虛擕琴訪友行觀稼展席呼兒坐釣魚逸興每邀明月飲雅懷常共白雲舒種花有譜晴多好擢桂無心夢久疏濡筆漫修髙士傳焚香遍讀古人書未辭活計同鳩拙故喜形骸類鶴臞亦欲放舟尋舊約相期當在早凉初題霅上張元之溪居卷清溪流水白雲關處士髙標玉筍班虛館數楹愚剡似好山十里畫圖間風前髙柳株株弱沙上羣鷗箇箇閒煮茗汲清童子小引雛哺果鳥聲蠻斫魚自可開尊爼肅客何妨響佩環避世武陵同絶境濯纓還許散襟顔南村詩集卷一
