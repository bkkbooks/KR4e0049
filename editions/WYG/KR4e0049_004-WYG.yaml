body:
  text: 南邨詩集巻四明陶宗儀撰題墨竹把燭倩官奴娟娟入畫圖秋聲風雨外照見碧珊瑚蒼梧帝子游蕭瑟倚清秋一握氷紈裏長縣翡翠鈎題紈扇折枝竹翦來青鸞尾挂向珊瑚鈎明月照清影一握湘江秋題畫菜曉起畦丁送長齋思益清平生耽此味厭説五矦鯖題飛鳴宿食百雁圖碧漢斜書草草清宵衆語雝雝莫向蘆花深處江南稻熟秋風題林亭髙士圖岩壑衣冠逸士松篁琴酒閒亭坐看雲生逺岫一江春水泠泠題落花游魚蒲抽翡翠茸茸花落臙脂片片曉來戲唼游魚雨霽緑波如練題王黄鶴竹石便面貌得篔簹墨未乾蕭蕭離立萬琅玕此君心事堅如石一握清風拂面寒趙海寧長松髙士圖春雷喚起蒼龍蟄鱗甲蜿蜒雲氣溼道人長鑱劚茯苓半天風雨山精泣莫春雜興次顧君舉韻漁父鯉魚長尺半提攜不受人家喚當壚解縛換酒歸爛醉滄江杏花畔趙待制山水山外溪平不肻流山前喬木易知秋水晶宫裏清幽地不信無人著釣舟矦仲冶風雨歸莊圖黑雨横江天漠漠饞蛟怒吼驚濤作扁舟冒險且歸來正恐明朝風更惡清曉過南屏漏盡銅虬夜未闌曙星炯炯碧雲端馬頭籠燭衝寒去直過南山第二關宫詞三首題王叔明士女閤門傳詔宴龍池宫漏穿花月上遲凖擬承恩供奉處鏤金團扇乞新詩大家妝著鬬時宜等候君王看月嬉三十六宫清夜永幽情不許外人知水晶别殿十分凉金碧平橋近建章直罷歸來成小立花深驚起宿鴛鴦題張渥湘妃鼔瑟圖朱絃促柱鼔湘靈霧鬢風鬟下紫㝠萬頃碧波明月裏曲終惟見數峰青題實相海上人滄江一葉詩巻刳刻輕於脱瓣蓮飄飄一葉寄栖禪風休月白波濤靜覺海重乗大願船次韻曦講師南仲牧閒園雜詠十首樹林鬱茂即祗園種藥栽蔬要剪繁甘菊醫方能療目頻分野老瀹曈昏蒿藜非類便須鉏菜甲青青小雨初更待明年春筍出就林燒熟味如酥曲徑傍邊薝蔔林蕋頭朶朶綴璚簪經餘未把袈裟解靜嗅清香坐樹陰日涉名園引興長緑陰多處石牀凉花時那似今番好翠篠娟娟過粉墻幽草疎花靜裏看桐陰穿膝坐蒲團頓除妄念機緣息方寸無縈眼界寛萵苣青青早芥紅引流分灌露華叢園丁采掇供香積日日攜筐向此中小築垣墉繚四陲前頭即是梵王祠沼花新吐芬陀利石鉢溪泉獻一枝新添野圃四無隣埽徑時時欵逸民展席松陰談妙覺我來借榻或經旬芳草池塘蛙亂啼青松未長鶴巢低坡陀誰種閒桃李玉立修篁箇箇齊牧閒不與世爭能雲䕶柴關玉作層客到莫嫌無供養鑿池栽藕種茭菱題畵二首抱琴髙士重重緑樹䕶清溪欲覓知音路轉迷布襪青鞋吟未了又隨野色過橋西停舟髙士落落長林水一灣緑陰多處白鷗閒畏途塵滿無心踏獨坐船頭看晚山次韻題柳燕溶溶煖緑漾芳堤一握柔絲剪未齊簾巻東風疎雨歇落花香染定巢泥題楊士賢山水風雨歸舟山雨溪風晚未休蕭蕭落葉滿汀洲漁船罷釣歸何處眼厎狂瀾正可愁雪林行旅積雪寒凝晝不消璚林琪樹聳孤標寄言逆旅休辭倦西崦人家路尚遙題馬遠竹溪吟奕圖好詩應向過橋成逸興還從對局爭此日山林無一事竹香細細晚風清為謝居士題畵册山中隱居小小茅茨住碧山柴門無客晝長關移家更入雲深處城市終年不往還竹深避暑萬竹林中草縛菴溪聲隱隱隔雲嵐日長客去收經巻一枕清風睡正酣題本原上人悟雪巻雪滿千山初定起璚林玉樹總如如湛然常寂心無染清靜圓明等太虛題袁安臥雪圖玉琢芙蓉朶朶開乾坤清氣費詩裁先生一榻髙千古不管門前縣令來題緑竹蒼石圖為萬竹山人壽粉香翠影碧琅玕丹鳳林中第一竿雨露恩濃磐石固清風日日報平安題畵梅梨雲落莫錦雲低誰冩氷魂上赫蹏玉骨從來無此色想應新浴武陵溪右紅梅明月孤山處士家湖光寒浸玉横斜似將篆籀縱横筆銕線圈成箇箇花右墨梅題墨芙蓉西風采采媚秋光絳節朱顔翡翠裳只恐夜深青女妒洗妝研沼墨痕香題和靖觀梅圖小朶遙岑隔翠漪背籠衣袖立多時暗香浮處催詩句落葉昏黄分外竒題趙廷采溪亭讀書圖溪山佳處搆茅亭四面芙蓉朶朶青新水夜來添一尺湘簾髙捲晝横經題雲莊畊隱圖亂雲深處水回環南畝無多屋數間曉起一犁春雨足夕陽牛角挂書還題觀瀑圖千峰紫翠挿芙蓉上界招提有路通更向石橋觀瀑布玉虹萬丈挂晴空題雙松獨釣圖雙松偃蹇水挼藍幾疊遙山送碧嵐一葉釣舟輕似葦短蓑烟雨老江南題張叔清采蒓圖秋風江上紫蒓肥童子攜筐采掇時獨有東曹能命駕至今此味少人知題夏士良修篁芙蓉故人一别兩年過寫寄相思恨轉多欲采芙蓉隔秋水只聞江上竹枝歌題畵菜蘆菔生兒菜有孫露芽雨甲媚盤飱自知肉食非吾相抱瓮何辭日灌園繞屋蔬畦稱食貧雨餘齊茁翠苗新山庖頓頓殊風致天上酥酡未足珍題梅鶴髙士圖月明孤鶴唳前汀一樹寒梅䕶石屏香篆已消童子倦道人猶對蕋珠經客窗聽雨四絶句次南山韻十年歸夢剡溪船眼底江山若箇邊春事寂寥人意嬾一天風雨共愁眠蕭然一室小於船那得心情到酒邊只怕今年無菜麥悶來抛巻曲肱眠處世真猶上瀬船紛紛人事浩無邊就中亦有清閒者醉即髙歌倦即眠新種埀楊可繫船尋盟日日到鷗邊當年曽向巴江泊政似如今聽雨眠題詩意圖杖藜訪友趂蕭閒采藥山深待未還流水石橋松影合溪童指㸃亂雲間題倪雲林枯木竹石小景蒼玉庚庚翠袖扶墨池洗出碧珊瑚倪顛老去風流盡只有雲林小畵圖題墨梅花光三昧幻氷魂滿紙春風帶墨痕好似孤山亭子上一枝斜映月黄昏開泖口號四首縣民應役開長泖兩岸髙低菜麥空程限不嚴功力怠監官酣酒舞裙紅四十里長横泖路㑹工都用六千人開挑兩月無成績主典汙慵欠拊循溝渠堰塞為開河河未開通雨轉多水浸麥根渾爛却今年生理竟如何萬農蹙額籲蒼旻莫把春霖困下民種得稻禾供餽餉全資二麥濟飢貧題鷓鴣湘江岸口黄陵廟苦竹叢低雨氣昏相喚相呼泥滑滑長途多少客銷魂題金華趙彦如所藏畫軸婺女光芒地􅀈靈天潢倒影湛清泠眼前不盡登臨意都在溪山一草亭題和靖擁爐覓句圖一童一鶴住西湖千古髙風識畫圖水影月香成絶唱苦吟猶自擁寒爐題黄葵西蜀孤芳分外清嫩黄新染越羅輕自從承却金莖露向日檀心一寸傾題雪景山水碎剪銀河片片零芙蓉開徧玉崚嶒八窗洞啟虚生白好似蓬婆最上層題葵花雉雞向日傾心矯不移援琴閒操雉朝飛仙人掌上金莖露滴著娟娟五彩衣題人物山水古賦裁成學遂初山童研墨且徐徐石頭几上溪藤滑旋拂松花對客書為許𤣥伯題畫黄菊道人小葺柳邊莊三徑西風逗晚香按譜秋葩班異品堂堂正色御袍黄緋桃學㑹徐熙筆法奇濃磨翠屑襯胭脂武陵溪上神游熟寫得春風小折枝題黄葵聚蝶圖亭亭花蕚媚秋光露滿金杯蝶翅凉二月好春渾忘却亂飛爭戀御羅黄題清暑觀瀑圖隔岸林泉照眼清玉虹千尺挂空青松風謖謖凉如洗一段匡廬九疊屏題倪元鎮雲岫溪亭圖扁舟昔日惠山前裹茗來烹第二泉清閟老仙呼鶴處岡頭亭子尚依然題林子山畵次韻子山乃松雪外孫余家有其畵名休承一箇青松覆小亭香浮菡萏遠逾清日長無事抛書坐靜聽文楸落子聲題荔枝大唐置驛貢遐方火齊虬珠裹蔗漿博得玉環纔一笑教坊曲奏荔枝香題曹雲西雙松圖泖雲西畔一詩翁畫法營丘理趣融四十年前經此地雙松無恙草堂空題萬玉圖踏雪尋梅訪老逋西泠橋外小山孤疎疎密密花爭發好似傳來萬玉圖題王若水戴勝桑樹柔條葉已空晚來獨立語東風織紝自是閨房事喜得頻催早獻功片片疎翎列頂旗娟娟文羽攬春輝邊庭大將能知汝獻捷封矦戴勝歸慈雲十詠靈峰古刹衆山羅立小為尊一朶靈峰啟法門氣聚風藏龍脈逺元符寳殿尚孤存慶雲禪關慶雲五色照清溪郁郁紛紛望逺迷第一禪關從此入西頭即是古招提􅡙師全身塔一定千年與世忘當時起塔謹安藏如今試啟雲龕鑰爪髪還應幾許長竺師覺花堂繽紛天雨寳優曇聽法升堂總戒嚴頓悟此心成一笑阿師不待覺尊拈運師芥子室維摩方丈未為竒我室呼如芥顆宜三萬二千師子坐著來尚可踢須彌薝蔔林薝蔔花開玉朶攢清香滿室似旃檀五千餘巻都披卻四十二章寧浪看松閣看雲長松落落逺塵寰重閣陰陰奠碧山盡日跏趺自怡悦禪心已共白雲閒蓮池翫月沼中浄植芬陀利天上髙縣白玉盤香逺光清宵更寂梵餘徙倚石闌干層巒拱翠雲屏九疊自天開龍象森嚴震法雷莫怪山靈無供養六時朝禮送青來雙溪環碧流水縈紆逺接天一支分入寺門前且教聽講蒼龍蟄菩薩來乗大願船庚午十二月十八日雪滿載寒花玉氣浮野航一箇小於甌曉來試上城頭望碧海金山兩白鷗辛未八月廿三日大風雨口號大風怒吼雨如麻入得更深勢轉加曉起忽聞墻外語今年只損木綿花辛未子月廿三日朔風顛號樹木枯層氷積雪凍糢糊三冬酷冷無今日獸炭頻燒醉玉壺癸酉五日六日陰七日雨兩日寒陰人日雨不堪吼地北方癡馬牛畊戰人供億百穀豐凶未可知穀日雨寒風翦翦雨㝠㝠水白雲黄菜麥青聽得老農墻外語今年不得看參倉􅅤切星九日雨終日霖霪不肻晴晚來片片雪花零竹爐熾火驅寒氣缸面分醅入夜缾赤脚雪雪停五日未全消雲淨天清氣泬寥故老相傳名赤脚來年山岳要枯焦十二月初一初六兩日聞雷今年臘月兩聞雷虩虩聲從何處來陽不閉藏先出地下民修省可禳菑丙子五日甲子雨正月上旬逢甲子試稽農厯定豐年奈何終日風兼雨又恐乗船入市廛三日率諸生赴禮部考試應試南宫聽考研諸生背讀瀉鳴泉清曹儀制耑分領次第編名奏奉天十日給賞講明三誥闡王言億萬師生沐湛恩曉起内廷催給賞謹持寳楮出端門十一日謝恩四更來簉紫宸班恭謝皇恩仰聖顔五拜禮嚴三叩首春風兩袖趣東還八月六日白露今朝白露亥時交小雨霏微向日捎野老為言無過慮嵗豐天意已先教廿三日打窗風霰五更頭寒沍重陰晝不收積水淼漫天一色望窮只益老農憂二月六日日出二竿許松江府城為黑氣䝉蔽若重霧然人對面莫辨誰某一飯頃乃散附城五七里間亦如是較之城中則稍輕耳此時處處鄉邨風日妍麗黑氣㝠濛壓府城路人交臂只聞聲須臾消散清如埽未卜將來作麽生臘月五日早霜鴛鴦萬瓦玉參差青女横陳肆臘威曉起推窗疑是雪稜稜還向太陽晞月九日穀日宜晴翻作雨明朝西北大風狂聖人在御民安樂未必天心降不祥廿八日雪杏蕋嬌紅柳眼青東風陣陣雪花明春光已是三之一厎是嚴寒砭骨清十一月朔大雪節早見雪狂風昨夜吼稜稜寒壓重衾若覆氷節氣今朝逢大雪清晨瓦上雪微凝臘月乙卯日已卯時雷從西北方起連朝氣候若春溫曉日曈曨忽慘昏一道金光飛閃電雷聲虩虩震天門正月十七日上元次夕月華明雪霰繽紛欲二更曉起作花飛向日苦寒砭骨勢崢嶸正月廿二日夜三更雷始鳴風狂雨急夜三更隱隱春雷已作聲節候數來先十日多應羣蟄未全驚南浦㑹波邨在松江城北三十里其西九山離立若幽人冠帶拱揖狀一水兼九山南過邨外以入于海而溝塍畎澮隱翳竹樹間春時桃花盛開雞犬之聲相聞殊有武陵風槩隱者停雲子居焉一舟曰水光山色時放乎中流或投竿或彈琴或呼酒獨酌或哦咏陶謝韋柳詩殆將與功名相忘嘗坐余舟中作茗供襟抱清曠不覺度成此曲主人即譜入中吕調命洞簫吹之與童子櫂歌相荅極鷗波縹緲之思云如此好溪山羨雲屏九疊波影涵素暖翠隔紅塵空明裏著我扁舟容與髙歌鼔枻鷗邊長是尋盟去頭白江南看不了何況幾番風雨畵圖依約天開蕩清暉别有越中真趣孤嘯柘篷窗幽情逺都在酒瓢茶具水葓茫搖晚月明一笛潮生浦欲問漁郎無恙否回首武陵何許一萼紅賦紅梅次郭南湖韻水雲鄉又南枝逗煖綽約漢宫妝春艶穠分朱鉛淺試翠袖獨倚修篁想應道東風料峭剪霞彩零亂補綃裳勾漏尋真丹丘授訣傲睨氷霜畢竟孤標還在縱夭桃繁杏難侣寒香瑪瑙坡頭珊瑚樹底江南别是風光且莫倚髙樓玉管怕輕盈飛處誤劉郎依舊小窗疎影淡月昏黄露華賦碧桃用南湖韻武陵夜寂記露影璇空一笑曾識素臉暈鉛巧把黛螺輕羃莫是歌渡烟江浣却舊家顔色還又訝深宫紺袖唾花猶溼問他阿母消息甚落莫梨雲青鳥難覓不比錦紅輕薄容易狼藉嫩緑䕶出溪頭誰顧采香仙客春晚也頻溫玉笙是得念奴嬌九日有感次友人韻黄花白髮又匆匆佳節感今懷昔雨覆雲翻無限態故國寒烟榛棘杜老漂零沈郎瘦損此意天應識劃然長嘯不知身是孤客呼酒漫祓清愁玉奴頻勸兩臉添春色眼底平生空四海倦拂紅塵風幘戲馬臺荒登龍人老往事休追惜山林無恙也須容我髙屐木蘭花慢次胡筆峰遷居韻占中山一隩雲晻靄水縈紆便小理蔬畦深鉏菊圃細甃花衢平生幾畨卜隱到而今方稱列仙臞問字溪翁載酒執經弟子將車猗歟心迹混樵漁安用絶交書向石上圍棋松陰搗藥樂意偏殊當年輞川圖畵有林泉如此更何如旋買良田種秫只知吾愛吾廬月下笛賦落梅東閣詩慳西湖夢淺好音難託香消玉削早孤標頓非昨阿誰底事頻横笛不道是江南搖落向空階閒砌天寒日􅇀病鶴輕啄情薄東風惡試快覓飛璚共翔寥廓氷魂漠漠謾憐金谷離索有時巧綴雙蛾緑天做就宫妝綽約待一㸃脆圓成須信和羮問却南邨詩集巻四
