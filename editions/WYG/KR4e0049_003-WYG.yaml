body:
  text: 南邨詩集巻三明陶宗儀撰曉起豆苗引蔓上疏籬桐樹吹花落釣磯老我田園閒處好故人書札近來稀挂巾蘿薜看雲起沐髮滄浪待日晞只怪平生詩癖在形骸消瘦不勝衣題王筠菴水邨山居二首埀楊舊種成籬落小徑初開近石矼夜雨漁舟添箇箇晴沙鷗鳥下雙雙夢魂不到鳴珂里卜築何須濯錦江沽酒鱠魚從野老髙僧招隱壓新腔松杉束屋青天小猿鶴當階白晝閒木客揖人騎虎下谿童采藥貿琴還玉笙聲斷雲連席丹竈光沉月滿闗我欲排楹與隣並掬泉洗耳聽潺湲録宋宫人語雲䕶春陰凝薄凍煙銷鑪篆帶餘馨殘花滿院鶯聲澀細雨吹簾草色青丹鳳不來天浩浩玉簫吹徹淚㝠㝠腰肢瘦損真無幾寧使清心混濁涇對月客子每看湖上月秋聲漸近竹邊窗流螢綴衣夜數箇白鶴聽琴時一雙甘旨未能娯綵服旅愁長是對寒缸飯牛屠狗誠無媿附鳳攀龍志未降熟食日有懷去秊今日天台路布襪青鞋捫薜蘿山鳥亂飛疎雨至人家閉戸落花多孤燈客鬢愁中改千里鄉闗夢裏過江漢悠悠為客淚先塋回首倍滂沱西湖晚步題湖山堂短策輕衫徐步穩平堤落日莫光遲郎君馬上敲金鐙官妓船頭唱竹枝老鶴不歸和靖墓長林還䕶鄂王祠吁嗟人事朝朝異山色湖光似昔時長安市長安市上多青樓樓下美人嬌以羞千金買笑復何惜萬里作客還自愁勲業未成慙寳鑑英雄何限看吳鈎百年世事如雲雨老大徒傷易白頭九日江城黤慘傷秋莫人事艱難感恨長正苦兵戈依遠道不堪風雨過重陽鬢毛垂領蕭蕭短菊蕋盈枝細細香妖氣天光兩㝠漠將軍何日定荆㐮獨坐簡趙彦徵豺狼猛噬據荆徐烽火連雲照玉除世上小兒皆習戰江南何地可安居諸侯控制兵機冗濫吏誅求國政疎獨坐小窗情思惡秋風嫋嫋正愁予曉發松江客裏東風促去程沙棠舟小布帆輕衝人鷗鳥雙雙起近水桃花樹樹明故喜呉淞堪寄食不愁江漢尚屯兵經綸事業成虚擲一寸葵心向日傾次邵冠軍客中見寄韻重關列㦸遲行舟小雨吹煙凝不流時迓檄書傳帥命數呼官酒破詩愁江城已擊扶搖上海宇還期汗漫游春樹重重雲莫合懷人多在驛西樓皆夢軒為陳汝嘉賦北窗髙臥羲皇上不比南柯太守衙塵世蕉陰方覆鹿山童竹裏自敲茶黄粱旅邸空仙枕春草池塘即謝家萬事轉頭同一幻怪來筠管忽生花偶成簡錢曲江字惟善坐看凉月上谿樓桐葉晶熒露氣浮戀闕近瞻天北極懐親遙隔海東頭寓形宇内一身老濯足滄浪萬里流安得神飇駕輕轂白雲直下即丹丘寄贈葉子澂名以清京口人避兵華亭遂家焉貧而尚節義平生不受官長罵結屋乃在深郊居田無二頃每種秫日有百錢惟買書養親上堂具甘旨留客煮飯挑嘉蔬憐君行義有如此名譽豈肻終閻閭次謝士英韻郊原十里非凡境屋宇無多似瀼西新竹長來吟徑小綠楊缺處畫橋低茶浮石鼎兒新煮詩滿雲箋手自題乗興看山出林麓短笻一箇影清谿春雨初晴沈野亭見訪九十日春渾有幾相將一半雨兼風草堂晴旭生虚白花徑兒童掃落紅漫喜故人來泗北更期後夜宿山中青鞋布襪須吾輩百遍相過意未窮次夏士良戸矦韻竹裏茅茨白板扉興來隨意卧牛衣天籠平野前山遠水拍危橋過客稀釣罷得魚沽酒去雨餘種豆荷鉏歸故人卻在城南住日日清觴四坐飛秋懐次夏停雲韻妖氛澒洞逼京華將畧時無李左車休唱貞元供奉曲似聞商女後庭花職方未復江南貢使者空乗海上槎自古和邊真拙計却令紅粉泣琵琶送陳平仲我居巷南子巷北同是挈家來避兵故園荆榛已能理逺道虎豺那可行老懐作惡輙數日寒谿送别傷離情未知後㑹更誰好斫鱸且醉雙銀罌讀史次謝元素韻長時讀史白雲西往事評來手自題亮也已亡誰相漢單云多智國存齊百川行地終歸海五緯經天未聚奎堪嘆洛陽宫外路銅駝荆棘夜烏啼樂靜草堂為衞叔靜賦屋繞芙蓉九疊屛日長客去掩閒庭岩花煖傍疎簾落階草晴分汗簡青溫火試香删舊譜汲泉煮茗續遺經江南定有徵賢詔太史方占處士星次韻荅楊廉夫先生移家正在小斜川新買黄牛學種田奏賦不騎沙苑馬懐歸長夢浙江船窗浮爽氣青山近書染凉陰緑樹圓樂嵗未教缾有粟全資芋栗應賔筵夜坐披衣散髮坐南榮漏㸃遲遲欲二更風約沼萍雲影淡月栖徑竹露華明石牀凉意浮珍簟寳鼎沈烟噴玉笙世慮不闗心似洗此身只覺在蓬瀛梅花隖谿北谿南十萬枝洞門深鎖幾人知月香水影無多語姑射羅浮自一竒千里喜傳春信早孤笻偏愛夕陽遲殷勤更入坡仙詠共補辛夷别墅詩守嵗次謝髙潔韻明日五更纔是春坐深不覺漏聲頻風塵澒洞向今夕燈火團欒能幾人老去清霜吹鬢髮愁來雙淚落衣巾乾坤擾擾皆兵甲何處谿山著此身機山懷古次趙廷采韻昭矦功業在人間二俊文章若可攀西洛竟從王冏辟秋風不遂季鷹還平原邨迥家山靜華表雲深鶴夢閒有客艤舟來弔古空林落葉雨澘澘長至日林泉偕雪林踰鳳岡訪友聨句次其韻鳳皇飛舞結青山九曲雲林第一闗輕櫂每從谿口去短蓑長自嶺頭還初陽消息升沈裏二老襟懐嘯咏間此地正堪頥莫景采芝厎用躡商顔催梅為雪林作的皪孤標隔水湄我家庭館見何遲喜迎春信無多日英負東風第一枝湖曲老逋魂定返羅浮仙子夢曾期短笻立待黄昏月嗅得寒香便賦詩代梅荅向煖南枝趂早開譲渠獨占百花魁與時無競緘春在感子相思索笑來吹笛且休明月厎煮茶宜傍白雲隈老予不比桃和杏直要鼕鼕羯鼔催次景訥菴韻送廷采傳家留得舊青氊旅食西州五十年老去秪知懐故國曉來生怕送歸船九山影落三江口丹杏花開二月天最是東風雙語燕留人飛過酒尊前先照樓為玉無瑕上人題若木枝頭耀燭龍寅賔先與最髙峰光明徧照三千界樓閣宏開第一重舉目心徵香水海至誠膜禮紫金容五時説法如親聽向上圓機不露鋒華嚴經云如日初出先照髙山聽雪為孫以貞賦瑤池阿母教飛璚細搗氷花擁佩旌郭索行沙林竹偃呉蠶食葉紙窗明短編清夜誰家讀柔櫓寒谿逺處聲閉戸先生俄側耳松濤沸起煮茶鐺八月十五夜玩月次韻髙捲湘簾看明月一年今夜十分嘉露華清灑玉毫兔林影還浮金背蟇太液池臺當更好廣寒城府望非賖據牀老子婆娑在嘯咏歡娛孰有涯次胡别駕韻寄李儀曹至剛皇帝徵除賛禮曹御爐烟染越羅袍太微埀象郎星近仙步趨朝地位髙夙夜寅清宗秩祀儀文開朗列英髦嗟余白髪懷思日孤鶴長鳴在九皋小園即事次胡廣文若思韻日長童僕理蔬畦官舍如同隱者栖新水方塘魚在藻落花小雨燕銜泥杯盤留客兒能奉琴册娯心手自攜滿紙文章新灑翰人人爭道外孫虀緋桃次韻同前凝脂近水騁芳姿劉阮從來見事遲血寫妖猩衣燦爛用紅衣人事燄融烈火錦昌披用石曼卿事夀同西母還丹日笑倚東風醉酒時絶勝渡江顔色淺英名乆入彦謙詩萬竹林為鶴砂于廷立賦渭川壌地栽千畞海上雲林長萬竿晉室一時人曠達爾家三徑日平安琅玕響激秋聲早翡翠陰團雨氣寒裹茗敲門容借看清風吟嘯對檀欒九日次韻今年九日還為客朋舊壺觴興趣同雁影江頭清淺處龍山天際有無中黄花細吐香堪采白髪髙歌氣不充醉把茱萸懐弟妹異鄉飄泊已成翁張林泉九日寄詩次韻荅之畊田鑿井水南郊嬾性從來謝拔茅草檄未能行虎落濡毫敢望立螭㘭菊萸並進重陽節萍水相親逺道交嵗嵗兹辰動懷想若為對飲共山肴新寒寫懷次韻世故漫漫混渭涇九山髙枕臥雲屏攤書霧拂雙眸瑩攬鏡霜欺兩鬢青歸燕凄凉誰復顧吟蛩哀怨不堪聽秋風落木茅茨破坐右髙縣陋室銘壬申十二月廿九日林泉抱拙伯仲萬山别駕同宿三味軒得何字嵗晏髙朋忽我過諸生尊爼罄歡歌老來短鬢因愁改醉後衰顔為酒酡燈影未隨雲影淡漏聲不似雨聲多明朝約共尋梅去屐齒泥深可奈何立春次韻厯降靈臺一嵗新氣調玉燭萬方春候灰浮動輕於雪臘酒傾來白似銀花勝亂簪人鬬巧菜盤新簇齒生津尋芳早晚如相約便整肩輿繼後塵雨窗㑹飲分韻得雞字南畞躬畊水一犂夜來風雨正凄迷華筵盛集書相拉白絹斜封手自題賔客不分牀上下杯盤盡出玉東西太平深野宜歡樂還憶都門曉聽雞和琴清萬山五日雨窓酌酒賦詩韻睡餘閒把離騷讀白髪星然一老身五采誰纒長命縷赤符不上小烏巾蘭湯滑凝芳華冽丹臼香融藥草新簾巻琴清軒外雨蒲觴酌客更情親夏原舟寄詩求譔其先子墓銘次韻荅之男兒不必嘆流離治世麒麟可繫羈好句自堪横槊賦壯懐莫為聽琴悲迢迢逺道江南夢念念雙親壟上碑此日勒銘當不愧行藏顛末我曾知贈良介菴上人開士傳來竺國燈驀然悟道在聞聲鯨音寳梵岩花落罏篆蒲團海月生靜掃六塵無染著要觀一性本圓明何時借我袈裟地試把宗乗與細評化城寺悟本心上人有軒修竹中今寺與軒幻為刼灰瓶錫游方自號竹軒志不忘也此君勁節保平安壞衲幽居寄嬾殘一榻清風敷具坐四窗凉雨巻簾看梵餘瑟瑟笙簫荅定起沈沈翡翠寒長作化城安隱想眼前隨處碧琅玕送潘貢士魯璵東風拂曙泮林春行李觀光上國賔嵗貢成材雖有格旦評雅望妙無倫帆浮翠縠江波灔馬控青絲柳色新此去辟雍天咫尺早持鈞軸見經綸送人才殷惟中春水緑波春草碧春風一櫂發江城到京便入人才選薦剡連排父老名朋舊稱揚多義舉衣冠惜别重交情此行喜遂平生志簪紱榮身感聖明甲戌元日次韻守嵗罏邊燭尚明家家簫鼓雜鐘聲紫霄散彩晨光發元日開祥淑氣生萬丈赤城懷復眺千絲白髪喜還驚老來但博身强健詩酒朋游慰客情送吕仲徵知縣之官武平明經擢第下金鑾題賜宫羅墨未乾早嵗喜詶尊主學長才先試牧民官銀章朱紱三千里白舫青簾五百灘在汀州一縣花開琴調古佇聽趣召入朝端題顔近仁清風巻近仁先朝進士能寫竹髙棟曽軒頫澗阿此君挺挺翠駢羅寫真縑素襟期合相與氷霜節操多鸞牡遄歸周甫誦蓬萊何處玉川歌門前應用開三徑自有故人時一過題朱文儀松軒清賞巻五鬛離離翠作行四簷奕奕住中央籖裁象齒尊經史帖䕶芸暉寳晉唐㸃易研朱朝滴露題詩握管晝焚香開庭亦有風來處不及君家意味長贈樂安居士張彦載治世優游賦考槃葛衣藜杖筍皮冠清谿一曲居常樂紅日三竿睡正安花外雨窗篘螘醞竹間風鼎瀹龍團到頭渾是清閒福笑引兒孫種合歡題王孟京先生采芝生巻髙風千古仰商顔自喜幽栖近九山短鍤每從層巘陟頃筐長帶亂雲還晴霞煖䕶金莖紫曉露香融玉朶殷辟穀延年端藉此飄然行簉列仙班賞牡丹次蕭古齋韻萬卉千葩推第一天然國色謝鉛華沈香亭對殊堪匹金帶圍成未足誇宿露煖風滋綘蠟曲闌輕幄障晴霞尊罍燕賞加題品格調清新是作家次韻送張處善歸楓谿慨世浮名散若烟喜君浩氣直如弦兵戈避地三江曲湖海論交廿載前夜雨漫懐揚子宅早潮催發米家船楓林渺渺晴雲外此去添予别緒牽代賦借鶴香靄瑤壇恭蕆事帝真幢節控神飇朱陵紫府傳丹檢白鶴青鸞下碧霄翅影亂隨旛影颺吭音渾與玉音調衆眸瞻睹同稱讃孰謂仙禽不可招中秋對月有感我室曽煩月照幃今年此夕認清輝芳時一去無繇返皓首同歸與願違譙漏聲傳人寂歴胡牀影矗露霏微碧霄如水連銀漢好洗浮生萬事非又次氷雪翁韻碧空湛湛露華清萬籟沈沈一鑑明節序俄驚今夕是光陰只使老懷驚桮盤小酌雙瓶盡賔主髙談四坐傾童子煮茶來報説蓮花漏刻已三更送萬用謙歸豫章阿兄司臬莅松城令弟辭家賦逺行吳楚相望縈别恨塤篪迭奏藹親情