平分秋正中飄香桂子落長空十分圓魄年年好一道寒光處處同清唳忽來蓬島鶴亂吟不斷露莎蟲南邨未醸南樓在治世琴尊屬老翁乙卯元日鳳厯新頒紀建文初元正旦上晴暾一人聖德敷皇極萬物光輝沐湛恩家世傳來書滿案賔朋致賀酒盈尊太平如此誠難值只願年年子又孫題唐涿州横雲草堂三泖移居屋幾楹青山一帶與雲横翠芬落几琴聲潤玉氣浮階鶴夢清剖竹專城施政教縣車故里養尊榮杖藜莫厭相過數好付兒郎管送迎城市山林為孫子華賦我家住近古城陰隨分生涯豈用心佳菊移栽秋粲粲修篁羅植晝森森溝池環匝泉源活門巷幽閒徑術深祗為長年躭野趣旁人都道是山林送上海知縣司公守道赴召妙揀憲臣來作宰文星天上照雲間薦賢名奏麒麟殿戀闕心馳虎豹關駐轂邑門留犢去借船浦口載書還東南賦税民罷病荅問應知動聖顔送人才何公遠朝端奉旨舉賢才使者馳書海上來琴冊緘封榮組紱衣冠飲餞列尊罍五城樓閣雲烟繞萬國山河錦繡開聖主臨軒求治切奏陳利病莫遲回題靖州衞陳指揮凌雲堂指麾訓練渠陽衞奕奕名堂結搆全五彩翬飛昭武烈八窗洞啟樹機權抛書草檄風生席握槊談兵月滿天他日論功須第一凌雲發軔上凌烟次胡萬山韻荅陳祠部坐樹疏梅試一吟紛紛霽雪落長林􅆽泉石鼎烹山茗溫火金鳧􅅡水沈幽意漫隨寒日淡故人遙住白雲深試看題寄新詩句珠玉篇篇有賞音題沈宗文竹梧軒竹梧竝植近軒墀一榻清風日自怡玉立娟娟氷雪操翠融挺挺鳳皇枝昌黎喻勒王孫誌工部吟題省署詩琴瑟斵成笙管截明廷九奏致雍熙送俞知縣嘉言之魯山皇朝進士聲華重藩邸清曹正列班有旨召除分宰出叩頭請告送親還疏章切嫓長沙傅組紱行之古魯山百里塗謠稱善治傳家定達五雲間送友之官握手河梁酒一巵若為㑹合在何時前旌剡剡催行邁疏桺蕭蕭綰别離明月圓虧千里共尺書往復半年期願言清慎修吾職早晚髙遷侍玉墀送李給事中行恕服闋之京師名敬給事先皇内六曹緝熙九法獨稱勞凷音塊苫堊室終縗制旌斾蘭舟試錦袍玉筍聨班黄道直宫花簇仗紫垣髙清朝事業光千古黼黻鋪張屬俊髦五日次萬山韻奪標競渡快輕狂憶昔游觀力尚强艾顆離離供巧製榴花朶朶殿羣芳辟兵人佩靈符小弔古江沈角黍香曉起畵梁雙語燕似知節序説興亡景辰張先生校文福建歸林公崇髙畫閩溪放櫂圖賦詩其上以餞因次韻就題一櫂閩溪下瀨船千巖萬壑路勾連榕陰處處浮嵐外杜宇聲聲落照邊考試來臨多士上宦游向在十年前故人分手難為别寫得雲山上蜀牋松齋為玉峰秀上人賦上人逺自海東來為愛青松到處栽花落石牀閒不掃聲和天籟定初回折將席上為談柄大明法師事留向山中具法材幾欲裹茶林下煮髙齋賦咏亦幽哉銕簫為張以道散人賦冶師百鍊昆吾刀範出錚錚七竅簫把弄豈侔龍躍琯奏成好列鳳儀韶清風赤壁三千頃明月揚州廿四橋海上散人攜作伴較渠思致我猶饒題許彦清松鶴軒奕奕髙軒結搆成種松養鶴遂閒情翠濤翻處鳴逾逺金粉飛時步覺輕衣溼長防清露滴枝蟠不怕舊巢傾葳蕤五粒真堪啖相與長年已訂盟臘月廿七日雪立春三日雪花稠作陣隨風卒未休屋宇髙低銀葢覆郊原逺近玉雕鎪將軍好問平吳策髙士誰乗訪戴舟九萬車夫多凍餒定應未到濟寧州十一月松江府起差民丁九萬名赴濟寧陸運糧米九萬石至徳州軍前送教諭沙允恭赴禮部試易經袖行薦剡謁南宫白鶴長鳴蕙帳空花氣春濃薰錦斾桺絲風軟拂青驄世承雨露詩書澤筆補陰陽造化功應試歸來須一月離筵勸酒莫匆匆送夏西疇還寧夏歸來已是十年過行李蕭蕭兩鬢皤紫塞氷霜還部曲清秋風雨去闗河潮浮短棹征途逺酒盡離觴别恨多從此音書應更少斷腸分手淚滂沱送道士葉道心游武當均陽雄鎮武當山金闕宏開縹緲間龍虎風雲環紫極龜蛇水火閟𤣥關杖藜逺道秋行役幢節層壇曉綴班此地逍遥酬夙願丹成九轉未知還送陳子章赴王家瀼館所多士留連醉别觴琴書一棹水花凉郊原不異東西瀼主客何分上下牀白髪埀埀勞授業青衿濟濟快升堂弦歌聲輟閒情好定有新詩為我將送戴叔溫赴京堂堂廷尉重詳刑幕下賢郎案牘清奔訃宅憂喪有制釋衰還吉禮無傾船從三泖湖頭發路向丹陽郭裏行此去功名渾好在秋風買酒敘離情送廷采還黄鶴山中三首廷采宋宗室諸孫世家越之姚江從外舅氏黄鶴翁讀書武林山中其為人趣操髙尚進止雍閒博涉書傳外喜吟咏尤善畵山水竹石擅一時之美大抵胸中所養不凡見諸筆下者自然超絶今年春復游淞江得相與往復兩月許忽懷故山猿鶴翩然賦歸日抵莫來告别燈下書此以餞兩眼昏花殊愧草率木葉蕭蕭小雨零西風鼓櫂晚潮生江山形勝歸圖寫今古詩篇付品評乗興漫窮登眺樂懷人不盡别離情蕙帷黄鶴應無恙此日歸來思益清黄鶴山中夙著聲丹青文學有師承前身直是王摩詰佳句還宗杜少陵溪上曉來烟似幄江南春盡雨如澠扁舟催發輕離别作惡情懷老不勝霜落松江水氣清風前一舸白鷗輕十年已是三番别兩地都來幾日程鬢髮蕭蕭憐我老杯盤故故惜親情開春有約重攜手不在吳山定越城送邵升遠應聘之京朝廷嵗嵗徵遺逸奉詔蒐羅在有司深巷窮經端可樂諸矦勸駕不容辭天威咫尺黄金闕虎拜三千白玉墀清問從容及民瘼東南黎庶洽雍熙送張有秩御史制闋如京師五采沖霄見羽儀龍蛇研影快清時報親讀禮三年畢事主揚名四海知獬廌班中曾抗疏鳳皇臺上好題詩滄江畫鷁潮催發不盡離愁酒一卮送錢敬叔嵗貢赴禮部名譲隴頭不待鶴書招勸駕賔筵禮數饒芹泮泳游才孔儁鵬程鶱翥氣彌髙九山霽色浮江渚十日春風拂柳條一曲驪駒頻喚酒離愁楚楚正難消送薛應翔人才之京持牒喜從鄉老薦畫船搥鼔發江城馬空冀北標雄逸鳳起河東仰聖明萬國朝天黄道直五雲擁日㤗階平旌旗研影三千字朱紱銀章被寵榮送徐思勉應聘書誥敇寒谿鼓櫂赴弓招雪㸃輕裝錦作袍日侍殿庭沾聖渥職書綸綍簉清曹鸞回鳳舞金花軸銕畫銀鈎玉兔毫九萬鵬程從此始登瀛視草步彌髙送曹士望應聘書誥敇丹詔徵賢上玉京草堂動采樂文明一經夙繼春秋學三事難忘仕宦情佶曲聱牙周誥古森嚴開朗晉書精八鑾臨幸西清日奏對鋪張屬俊英送貢士蔣時俊之京名彦英聖世崇文治教隆嵗徵多士赴南宫賢關上舍髙升日泮水西齋靜學功夜雨寄懐三徑竹春風得意五花驄臨岐握手難為别尊酒何時笑語同送張宗武宗武應聘入京余以師生之義偕親友四五人送至姑蘇别洪武已已正月四日晚解纜明日大雪深二尺許又明日雪霽過澱山湖賦此以簡同舟之能賦者小舟衝雪向來曾如此湖山喜快晴萬頃淵淳雲浩渺一峰危立玉崢嶸寒生毳褐清尊益色映烏紗白髪明只怕閶門明日到春風惱亂别離情贈龜卜金谷祥周官太卜寳神龜旦旦粱黄黄絹裹粱卯以祓龜澡祓之造竈灼鑽研恭按式謀為杌隉用稽疑一人能了三人識諸兆還從四兆推獨有谷祥金處士傳家術業邃於斯志喜洪武庚午五月至六月彌月不雨松江命方士陸雲澗建法壇仙鶴觀禱焉余所居長泖上去城北三十餘里地勢髙亢河流涸禾稼悴民惶惶無所措十四日未申之交雷電以風急雨隨至十八日又雨潮汐復大作涸者溢悴者榮因以志喜問城中人雖涓滴無有也翹首甘霖久不霑火雲赤日勢如惔桔橰聲斷川流竭䆉稏苗枯暑氣炎迅電掣霆誅厲魃蒼龍飲海抉飛廉四郊滿慰三農意從此豐年可預占次天淵韻二首辭親祝髪已真休孰肻將心憶故丘禪榻熏爐從早夜雲笻雨笠幾春秋朝廷制下催歸籍羅刹江横去買舟公案參餘千七百明年試罷復來游風采飄飄若貫休相逢猶憶在丹丘多師妙闡三乗法老我愁添兩鬢秋薝蔔清芬浮雅製鳳皇空翠落歸舟到鄞應是無多月又向金陵賦遠游上人寄吳淞之昭慶寺寺有繙經室曰薝蔔林鳳皇山在寺之東北隅邵𢎞逺用陳祠部韻賦詩見寄和以荅之故鄉遙隔一谿青眼底湖山興趣增菊本賸栽多按譜魚秧新種未容罾舊藏書富縣籖庋重慶堂髙衣采登未卜何時能往訪懷人長望泖雲層青出於藍分外青承傳世學喜加增濟川舟具帆檣柁漁海人資網罟罾豹管一斑慙淺見天門八翼㑹髙登老余待盡南邨裏屋上添茅嵗嵗層送鄉貢進士錢宗善餘慶吳時緯仲文吳克潛綱赴京㑹試一從鼓篋見竒才髙步蟾宫折桂來聖世設科羅俊彦春闈較藝奪髙魁柳陰繫馬深杯勸江上揚帆急鼓催此去定知逢慶㑹奎光昨日燭三台新水生時一櫂輕吳淞江上雨初晴㑹知富貴能相逼决取科名在此行龍虎榜髙濃淡墨鳳皇臺近古今情璚林宴後還登覽萬國山河共帝京東風攬轡過長干楊柳青絲拂繡鞍場屋競誇攀桂手文章深契主司官泥金寫帖緘書寄燒尾開筵共客歡玉陛臚傳當第一班催鵷鷺立朝端和張賔暘西疇汎舟韻二首平疇積水欲成湖未有良工寫作圖晴日曈曨收宿靄暖風和暢拂春蕪緑楊紅杏韶華麗白舫青簾主客娛老子放懷成痛飲醉循歸路日西晡潦水茫茫接澱湖人家如在輞川圖日明練色涵青嶂風細鱗紋漾緑蕪打鼓踏車農事冗放船攜酒客情娯飲闌同叩鄰姬戸啜茗聽謳直至晡故社士姚文實輓詩啟祠抱主鄰炎熄刲股煎糜父病痊一代衣冠今社士百年詩酒古神仙髙風雅入名人傳孝行宜登太史編欲訪清游已陳迹空山短日思凄然朝廷賜爵社士年七十三卒國子學録錢鼒作傳哭趙廷采儼餘姚江上故王孫黄鶴山中講世昏氷玉聲華過衞樂丹青事業在乾坤半途忍棄妻兒面一念應懐父母恩泚筆為修潛徳傳無多老淚只銷魂悼周通𤣥鍊師史君延致禱雩壇電掣霆流起劍端祕訣曾傳蒼玉檢長生未服紫金丹月升海嶠􅆐啼切露溼松巢鶴夢寒雲屋秋扃風落木似聞環珮尚珊珊因祈雨勞神得疾迤􅆔而亡洪武丁卯九月十六日臘月癸亥立春喜晴三首一冬霪雨動彌旬今日初晴值立春八表蕩除陰沴盡萬民瞻睹太陽新土牛綵仗寒猶沍蔬甲雕盤緑未勻林下老翁增夀紀宫花不上小烏巾開嵗三元尚一旬東城簫鼔已迎春辛盤切出絲絲細花勝簪來朶朶新柳眼蹙金猶淺嫩梅腮傅粉已輕勻臘醅缸面浮香螘不負吾家漉酒巾霖潦相仍幾浹旬和風麗日逗香春龍精戒旦陽交泰天子崇文厯換新檻外柳髙金縷弱庭前草短翠茸勻老夫還怕餘寒在煖耳難除白㲲巾已已七夕立秋次胡萬山韻頭童齒豁鬢毛衰老大徒添宋玉悲天上雙星應有約人間一葉似知時綵樓香滿凉生早銀漢橋横夜度遲此日報秋端罕遇呼兒捉筆和新詩白露日桂花開次張一髙韻池上曾軒日夜開天埀銀漢洗浮埃岩花初見丹英吐節候新交白露來細細古香吹小榻瀼瀼清氣落深盃蟾宫此夕知何夕老子神游不用猜洪武庚午正月七日雪東皇在御未班春滕六呈祥景物新一夜花明寒栗冽九山玉潔曉精神清浮剡曲懷思櫂淨洗邊疆戰伐塵百榖有秋端可望草堂紀詠屬詩人十日喜晴九日春霖曉忽晴鵓鴣喚婦鳥和鳴麥畦水漫人疏濬梅驛泥融客問程景象從今還好在江山依舊可憐生待看三五燒燈夜簫鼔聲中樂太平七月廿四日喜雨口號鑠石流金暑肆威槔聲響荅稻將疲天濡霈澤三時久水漫枯疇二寸奇雨玉雨珠那可濟維糜維芑實堪期黄童白叟爭稱道太守䖍誠為我祈八月初二日喜雨次林秉彝韻水涸田枯若漏瓢桔槔聲動出層霄滂沱雨澤驅炎熇泱漭潢汙混海潮今嵗定期秋稔熟前邨已救稻枯焦農人鼔腹齊歡躍管有糧儲奉聖朝十一月廿七日雪賦禁體詩一首明日小寒九㝠裁剪密還稀驢背旗亭索酒時剡水懐人乗逸興梁園授簡騁妍詞小寒紀節欣相遇瑞兆占年定可期莫塑獅兒供一笑埽來煮茗快幽思七月十四日書事雲靄㝠迷風暴烈雷霆擊薄雨滂沱十圍大樹相隨壓百丈神龍競逐過潢潦驟增疑漫海溪流直立似縣河天威未霽誠當懼冠服兢兢念靡它南邨詩集巻三
