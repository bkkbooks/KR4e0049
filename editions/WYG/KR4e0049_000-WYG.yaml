body:
  text: 南村詩集别集類五明提要臣等謹案南村詩集四巻明陶宗儀撰宗儀有國風尊經已著錄是編毛晉嘗刻入十元人集劉體仁七頌堂集有與張實水尺牘稱讀史不載陶南村竊謂此君靖節一流人今考十元人集内如倪瓉顧阿瑛亦皆親見新朝然瓉遁跡江湖阿瑛隨子謫徙未沾明禄自可附朱子綱目陶潜書晉之例宗儀則身已仕明孫作滄螺集中有陶九成小傳可證晉仍列之元人非事實矣觀集中洪武三十一年皇太孫即位詩曰老臣忭舞南村底笑對兒孫兩鬢霜則宗儀臣明原不自諱又集中三月朔日至都門二日早朝三日率諸生赴禮部考試十日給賞十一日謝恩諸詩即明史本傳所謂洪武二十九年率諸生赴禮部試時作也是又豈東籬采菊之人所肯為之事又何必曲相假借強使與栗里同稱乎是集不知何人所編考其題中年月及詩中詞意入明所作十之九惟鐃歌鼓吹曲諸篇似為元時作耳其編次年月頗為無緒殆雜收遺稿而錄之未遑銓次又顧阿瑛玉山草堂雅集所載澂懐樓七律一首送殊上人七律一首皆不見收知非宗儀自編也毛晉品其詩如疎林早秋殊不甚似然格力遒健實虞楊范掲之後勁非元末靡靡之音其在明初固屹然一巨手矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:84f67627e19f4a1acccdd0783d5464df7608d629090daf8b2ca6fe7f38728eec
